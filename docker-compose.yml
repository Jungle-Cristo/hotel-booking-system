version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: hotel-booking-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: hotel_booking
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

  # Redis 缓存
  redis:
    image: redis:7.0
    container_name: hotel-booking-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: always

  # SpringBoot 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel-booking-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: hotel_booking
      DB_USER: root
      DB_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: hotel_booking_secret_key
    depends_on:
      - mysql
      - redis
    restart: always

volumes:
  mysql-data:
  redis-data: